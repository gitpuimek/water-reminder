<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Water Reminder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0a1628;
    --surface: #111e35;
    --card: #162440;
    --border: #1e3050;
    --water: #38bdf8;
    --water-dim: #1e6a8a;
    --success: #34d399;
    --warn: #fb923c;
    --text: #e2eaf5;
    --text-dim: #7a93b4;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Sarabun', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    font-size: 16px;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--water);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-drop {
    width: 28px; height: 28px;
    background: var(--water);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    flex-shrink: 0;
  }

  .refresh-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--water);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 14px;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn:active { background: var(--border); }

  main {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--water);
    line-height: 1;
  }

  .stat-unit {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.4;
  }

  /* Water card */
  .water-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .water-tank {
    width: 64px;
    height: 100px;
    border: 2px solid var(--water-dim);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .water-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, var(--water) 0%, var(--water-dim) 100%);
    transition: height 1s ease;
    opacity: 0.8;
  }

  .water-pct {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    z-index: 1;
  }

  .water-info h2 {
    font-family: var(--font-display);
    font-size: 18px;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .water-info p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Chart */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* History */
  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    text-align: left;
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 8px 10px 8px;
    font-weight: 600;
  }

  td {
    padding: 10px 8px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-ok   { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-warn { background: rgba(251,146,60,0.15);  color: var(--warn); }
  .badge-info { background: rgba(56,189,248,0.15);  color: var(--water); }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 16px;
  }

  .error-msg {
    background: rgba(251,146,60,0.1);
    border: 1px solid rgba(251,146,60,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--warn);
    margin-bottom: 16px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-drop"></div>
    Water Reminder
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ รีเฟรช</button>
</header>

<main>
  <div id="error" style="display:none" class="error-msg"></div>
  <div id="loading" class="loading">⏳ กำลังโหลดข้อมูล...</div>
  <div id="content" style="display:none">

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">ดื่มวันนี้</div>
        <div class="stat-value" id="total-today">0</div>
        <div class="stat-unit">มล.</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ครบเป้า</div>
        <div class="stat-value" id="rounds-ok">0</div>
        <div class="stat-unit">จาก <span id="rounds-total">0</span> รอบ</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ล่าสุด</div>
        <div class="stat-value" style="font-size:20px" id="last-update">-</div>
        <div class="stat-unit">น.</div>
      </div>
    </div>

    <div class="water-card">
      <div class="water-tank">
        <div class="water-fill" id="water-fill" style="height:0%"></div>
        <div class="water-pct" id="water-pct">0%</div>
      </div>
      <div class="water-info">
        <h2 id="status-text">รอข้อมูล...</h2>
        <p id="status-detail">กำลังโหลดข้อมูลจาก Google Sheets</p>
      </div>
    </div>

    <div class="chart-card">
      <div class="card-title">ปริมาณน้ำแต่ละรอบ (วันนี้)</div>
      <canvas id="drinkChart" height="160"></canvas>
    </div>

    <div class="history-card">
      <div class="card-title">ประวัติการดื่มน้ำ</div>
      <table>
        <thead>
          <tr>
            <th>เวลา</th>
            <th>เหตุการณ์</th>
            <th>ดื่ม</th>
            <th>สถานะ</th>
          </tr>
        </thead>
        <tbody id="history-table"></tbody>
      </table>
    </div>

  </div>
</main>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPDO1C0Gz2e9a4mED3LyyBU6JIqi69RKyi1HHuXUzrfjvGR_Bhnf_PwQBW7kpwWRo10g/exec";
let chart = null;

function formatTime(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}

function isToday(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  return d.getDate() === now.getDate() &&
         d.getMonth() === now.getMonth() &&
         d.getFullYear() === now.getFullYear();
}

function eventLabel(event) {
  const map = {
    'start': 'เครื่องเริ่มทำงาน',
    'bottle_placed': 'วางขวดน้ำ',
    'bottle_empty': 'น้ำหมดขวด',
    'drink_ok': 'ดื่มน้ำครบ',
    'drink_alert': 'ดื่มน้ำไม่ครบ',
    'test': 'ทดสอบ'
  };
  return map[event] || event;
}

function badgeClass(event) {
  if (event === 'drink_ok' || event === 'bottle_empty') return 'badge-ok';
  if (event === 'drink_alert') return 'badge-warn';
  return 'badge-info';
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const rows = await res.json();

    const todayDrinks = rows.filter(r => isToday(r.time) && (r.event === 'drink_ok' || r.event === 'drink_alert'));
    const totalDrunk = todayDrinks.reduce((s, r) => s + (parseFloat(r.drunk_ml) || 0), 0);
    const roundsOk = todayDrinks.filter(r => r.event === 'drink_ok').length;
    const roundsTotal = todayDrinks.length;

    document.getElementById('total-today').textContent = Math.round(totalDrunk);
    document.getElementById('rounds-ok').textContent = roundsOk;
    document.getElementById('rounds-total').textContent = roundsTotal;

    const lastRow = rows[rows.length - 1];
    document.getElementById('last-update').textContent = lastRow ? formatTime(lastRow.time) : '-';

    const pct = Math.min(100, Math.round((totalDrunk / Math.max(90 * (roundsTotal || 1), 1)) * 100));
    document.getElementById('water-fill').style.height = pct + '%';
    document.getElementById('water-pct').textContent = pct + '%';

    const lastDrink = todayDrinks[todayDrinks.length - 1];
    if (!lastDrink) {
      document.getElementById('status-text').textContent = 'ยังไม่มีข้อมูลวันนี้';
      document.getElementById('status-detail').textContent = 'วางขวดน้ำบนเครื่องเพื่อเริ่มจับเวลา';
    } else if (lastDrink.event === 'drink_ok') {
      document.getElementById('status-text').textContent = '✅ ดื่มน้ำครบรอบล่าสุด';
      document.getElementById('status-detail').textContent = `ดื่มไป ${lastDrink.drunk_ml} มล. เมื่อ ${formatTime(lastDrink.time)}`;
    } else {
      document.getElementById('status-text').textContent = '⚠️ ดื่มน้ำไม่ครบ';
      document.getElementById('status-detail').textContent = `ดื่มไปแค่ ${lastDrink.drunk_ml} มล. จาก 90 มล. เมื่อ ${formatTime(lastDrink.time)}`;
    }

    const labels = todayDrinks.map((r, i) => `รอบ ${i + 1}`);
    const values = todayDrinks.map(r => parseFloat(r.drunk_ml) || 0);
    const colors = todayDrinks.map(r => r.event === 'drink_ok' ? 'rgba(52,211,153,0.8)' : 'rgba(251,146,60,0.8)');

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('drinkChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'ดื่มไป (มล.)',
          data: values,
          backgroundColor: colors,
          borderRadius: 6,
          borderSkipped: false,
        }, {
          label: 'เป้าหมาย 90 มล.',
          data: values.map(() => 90),
          type: 'line',
          borderColor: 'rgba(56,189,248,0.5)',
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          borderWidth: 1.5,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#7a93b4', font: { family: 'Sarabun', size: 12 }, boxWidth: 20 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} มล.` } }
        },
        scales: {
          x: { ticks: { color: '#7a93b4', font: { size: 12 } }, grid: { color: '#1e3050' } },
          y: {
            ticks: { color: '#7a93b4', font: { size: 12 }, callback: v => v + ' มล.' },
            grid: { color: '#1e3050' },
            min: 0, max: 120
          }
        }
      }
    });

    const tbody = document.getElementById('history-table');
    const displayRows = rows.filter(r => r.event && r.event !== 'start' && r.event !== 'test').reverse().slice(0, 20);
    tbody.innerHTML = displayRows.map(r => `
      <tr>
        <td>${formatTime(r.time)}</td>
        <td>${eventLabel(r.event)}</td>
        <td>${r.drunk_ml ? r.drunk_ml + ' มล.' : '-'}</td>
        <td><span class="badge ${badgeClass(r.event)}">${r.event === 'drink_ok' ? 'ผ่าน' : r.event === 'drink_alert' ? 'ไม่ครบ' : 'ข้อมูล'}</span></td>
      </tr>
    `).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'โหลดข้อมูลไม่ได้: ' + err.message;
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
